<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequential KYC Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .kyc-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .alert-fail { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .alert-pass { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    </style>
</head>
<body>
<div class="container kyc-container">
    <h2 class="text-center mb-4">KYC Verification Setup G13-M10</h2>
    
    <div id="statusAlert" class="result-box"></div>

    <form id="kycForm">
        <!-- Input Step -->
        <div id="step-inputs" class="step active">
            <div class="mb-3">
                <label class="form-label">ID Document (Aadhar) <span style="color: red;">*</span></label>
                <input type="file" id="idDocument" class="form-control" accept="image/jpeg, image/png" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Selfie Photo <span style="color: #999; font-size: 0.9em;">(Optional)</span></label>
                <input type="file" id="selfiePhoto" class="form-control" accept="image/jpeg, image/png">
            </div>
            <button type="button" class="btn btn-primary w-100" id="startBtn">Start Verification</button>
        </div>

        <!-- Processing Step -->
        <div id="step-processing" class="step text-center">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <h5 id="processText">Processing Document...</h5>
        </div>
    </form>
</div>

<script>
const BACKEND_URL = 'https://ekyc-backend-750223193485.asia-south2.run.app';

document.getElementById('startBtn').addEventListener('click', async () => {
    const idFile = document.getElementById('idDocument').files[0];
    const selfieFile = document.getElementById('selfiePhoto').files[0];
    const statusAlert = document.getElementById('statusAlert');
    const processText = document.getElementById('processText');

    if (!idFile) {
        alert("Please upload ID Document (Aadhar). Selfie is optional.");
        return;
    }

    // UI Reset
    document.getElementById('step-inputs').classList.remove('active');
    document.getElementById('step-processing').classList.add('active');
    statusAlert.style.display = 'none';

    let verificationScores = [];
    let stepsCompleted = [];

    try {
        // Step 1: Document Verification (ALWAYS)
        processText.innerText = "Step 1: Verifying Document...";
        let formDataDocs = new FormData();
        formDataDocs.append("file", idFile);

        const docRes = await fetch(`${BACKEND_URL}/verify-full`, {
            method: "POST",
            body: formDataDocs
        });
        const docData = await docRes.json();

        // Document verification is flexible - just get the data
        const docConfidence = (100 - docData.risk_score) / 100;
        verificationScores.push(docConfidence);
        stepsCompleted.push(`Document: ${docData.is_verified ? '✅ Verified' : '⚠️ Flagged'}`);

        // Step 2: Face Verification (OPTIONAL - only if selfie provided)
        if (selfieFile) {
            processText.innerText = "Step 2: Verifying Face...";
            let formDataFace = new FormData();
            formDataFace.append("id_photo", idFile);
            formDataFace.append("selfie", selfieFile);

            const faceRes = await fetch(`${BACKEND_URL}/verify-face`, {
                method: "POST",
                body: formDataFace
            });
            const faceData = await faceRes.json();

            if (faceRes.ok) {
                // If face doesn't match, use 0.0 confidence to fail verification
                const faceConfidence = faceData.match ? faceData.confidence : 0.0;
                verificationScores.push(faceConfidence);
                stepsCompleted.push(`Face Match: ${faceData.match ? '✅ Match' : '❌ Mismatch'}`);
            } else {
                stepsCompleted.push(`Face Match: ⚠️ Could not verify`);
            }
        } else {
            stepsCompleted.push("Face Match: ⏭️ Skipped (no selfie)");
        }

        // Step 3: Address Detection (OPTIONAL)
        processText.innerText = "Step 3: Detecting Address...";
        let formDataAddress = new FormData();
        formDataAddress.append("file", idFile);

        const addrRes = await fetch(`${BACKEND_URL}/detect/address`, {
            method: "POST",
            body: formDataAddress
        });
        
        if (addrRes.ok) {
            const addrData = await addrRes.json();
            verificationScores.push(addrData.confidence || 0.8);
            stepsCompleted.push(`Address: ${addrData.success ? '✅ Detected' : '⚠️ Not found'}`);
        } else {
            stepsCompleted.push("Address: ⚠️ Could not detect");
        }

        // Final Evaluation - use average of completed steps
        const avgConfidence = verificationScores.length > 0 
            ? verificationScores.reduce((a, b) => a + b, 0) / verificationScores.length 
            : 0;

        const resultDetails = stepsCompleted.join('\n');
        
        if (avgConfidence >= 0.75) {
            showResult(`✅ KYC PASSED!\nOverall Confidence: ${(avgConfidence * 100).toFixed(1)}%\n\n${resultDetails}`, true);
        } else if (avgConfidence >= 0.5) {
            showResult(`⚠️ KYC NEEDS REVIEW!\nConfidence: ${(avgConfidence * 100).toFixed(1)}%\n\n${resultDetails}`, false);
        } else {
            showResult(`❌ KYC FAILED!\nConfidence: ${(avgConfidence * 100).toFixed(1)}%\n\n${resultDetails}`, false);
        }

    } catch (error) {
        showResult(`❌ Verification Error: ${error.message}`, false);
    }
});

function showResult(message, isSuccess) {
    document.getElementById('step-processing').classList.remove('active');
    document.getElementById('step-inputs').classList.add('active');
    
    const alertBox = document.getElementById('statusAlert');
    alertBox.style.display = 'block';
    alertBox.className = `result-box ${isSuccess ? 'alert-pass' : 'alert-fail'}`;
    alertBox.innerHTML = `<pre style="white-space: pre-wrap; font-family: inherit; margin: 0;">${message}</pre>`;
}
</script>
</body>
</html>
